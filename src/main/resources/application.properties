spring.config.import=optional:file:.env[.properties]
spring.application.name=notion-fuse
spring.datasource.url=jdbc:h2:mem:notionfuse
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.h2.console.enabled=true

application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
application.security.jwt.expiration=86400000

# OAuth2 Settings
notion.client.id=${NOTION_CLIENT_ID}
notion.client.secret=${NOTION_CLIENT_SECRET}
notion.redirect.uri=${NOTION_REDIRECT_URI}
notion.auth.url=https://api.notion.com/v1/oauth/authorize?owner=user&client_id=${NOTION_CLIENT_ID}&response_type=code&redirect_uri=${NOTION_REDIRECT_URI}